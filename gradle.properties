# Enable the build cache to save time by reusing outputs produced by other successful builds.
# https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching=true
# Enable the configuration cache to reuse the build configuration and enable parallel task execution.
# (Note that some plugins may not yet be compatible with the configuration cache.)
# https://docs.gradle.org/currentuserguide/configuration_cache.html
org.gradle.configuration-cache=true

# Tell Gradle where to look for JDKs so it picks Java 21 even when a different version is on PATH.
# The foojay-resolver-convention plugin (in settings.gradle.kts) extends this: if none of these
# directories contain JDK 21, it auto-downloads from Maven Central.
org.gradle.java.installations.paths=/usr/lib/jvm/java-25-openjdk-amd64,/usr/lib/jvm/java-21-openjdk-amd64,/usr/lib/jvm/default-java,~/.sdkman/candidates/java/21.0.11-tem/bin/java

